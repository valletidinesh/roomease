name: Build Android APK

on:
  workflow_dispatch: # Allows manual trigger
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Create local.properties
      run: |
        echo "SUPABASE_URL=https://ejlqihimkbsonetiexeu.supabase.co" > android/local.properties
        echo "SUPABASE_ANON_KEY=sb_publishable_BUFAIZt-Aumk5_3rxjzVYw_M8DQtxgD" >> android/local.properties

    - name: Build Debug APK
      run: cd android && gradle assembleDebug > build_log.txt 2>&1

    - name: Commit build log
      if: failure()
      run: |
        git config user.name "GitHub Action"
        git config user.email "action@github.com"
        git add android/build_log.txt
        git commit -m "chore: add build log on failure"
        git push

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: RoomEase-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
